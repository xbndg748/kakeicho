<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="やりくり帳">
<title>やりくり帳</title>
<link rel="icon" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F0E8;
  --surface: #FFFDF8;
  --surface2: #EDE8DC;
  --ink: #1A1410;
  --ink2: #6B5E50;
  --ink3: #9C8D7E;
  --accent: #C84B2F;
  --accent2: #E8956A;
  --green: #3A7D5C;
  --green-light: #EAF4EE;
  --red: #C84B2F;
  --red-light: #FAEAE6;
  --blue: #2F5FC8;
  --blue-light: #E6EEFA;
  --border: #D8D0C4;
  --shadow: 0 2px 12px rgba(26,20,16,0.08);
  --radius: 14px;
  --radius-sm: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.6;
  overflow-x: hidden;
}

/* ── ヘッダー ── */
.app-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--ink);
  padding: 12px 16px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.app-title {
  font-family: 'DM Serif Display', serif;
  font-size: 20px;
  color: var(--bg);
  letter-spacing: 0.02em;
  white-space: nowrap;
}
.month-nav {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 50px;
  padding: 4px 8px;
}
.month-nav button {
  background: none;
  border: none;
  color: var(--bg);
  font-size: 16px;
  padding: 2px 6px;
  cursor: pointer;
  border-radius: 50%;
  line-height: 1;
}
.month-nav button:active { background: rgba(255,255,255,0.2); }
.month-label {
  color: var(--bg);
  font-size: 15px;
  font-weight: 700;
  min-width: 80px;
  text-align: center;
}

/* ── サマリーカード ── */
.summary-bar {
  background: var(--accent);
  padding: 14px 16px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 4px;
  text-align: center;
}
.summary-item { }
.summary-label { font-size: 10px; color: rgba(255,255,255,0.75); font-weight: 500; letter-spacing: 0.05em; }
.summary-value { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: -0.02em; }
.summary-value.balance-positive { color: #A8EDCA; }
.summary-value.balance-negative { color: #FFBBAA; }

/* ── メインコンテンツ ── */
.main {
  padding: 14px 14px 100px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ── セクションカード ── */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 14px 10px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
}
.card-header-left {
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-icon {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.icon-income { background: var(--green-light); }
.icon-fixed { background: var(--blue-light); }
.icon-cash { background: #FEF3E2; }
.icon-actual { background: #F3EEFE; }
.icon-savings { background: var(--green-light); }
.icon-chart { background: #FFF0F5; }

.section-title { font-size: 13px; font-weight: 700; color: var(--ink); }
.section-subtitle { font-size: 11px; color: var(--ink3); }
.section-total {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.total-income { color: var(--green); }
.total-expense { color: var(--red); }
.total-savings { color: var(--blue); }

.chevron {
  font-size: 12px;
  color: var(--ink3);
  transition: transform 0.2s;
  margin-left: 4px;
}
.card.collapsed .chevron { transform: rotate(-90deg); }

.card-body {
  padding: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}
.card.collapsed .card-body { display: none; }

/* ── 行 ── */
.row {
  display: flex;
  align-items: center;
  padding: 9px 14px;
  border-bottom: 1px solid var(--surface2);
  gap: 8px;
}
.row:last-child { border-bottom: none; }
.row-label {
  flex: 1;
  font-size: 13px;
  color: var(--ink2);
  min-width: 0;
}
.row-note {
  font-size: 10px;
  color: var(--ink3);
  white-space: nowrap;
  margin-left: 4px;
}
.row-input-wrap {
  display: flex;
  align-items: center;
  gap: 2px;
  flex-shrink: 0;
}
.yen-sign {
  font-size: 12px;
  color: var(--ink3);
  font-weight: 600;
}
.row-input {
  width: 100px;
  text-align: right;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 6px 8px;
  font-size: 14px;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 500;
  color: var(--ink);
  background: var(--surface);
  outline: none;
  -webkit-appearance: none;
  transition: border-color 0.15s;
}
.row-input:focus {
  border-color: var(--accent2);
  background: #FFFDF8;
}
.row-input.income-input:focus { border-color: var(--green); }
.row-input.savings-input:focus { border-color: var(--blue); }
.row-input.has-value { background: #FFFBF0; }

/* 削除ボタン */
.delete-btn {
  background: none;
  border: none;
  color: var(--ink3);
  font-size: 16px;
  padding: 4px;
  cursor: pointer;
  border-radius: 50%;
  flex-shrink: 0;
  line-height: 1;
}
.delete-btn:active { background: var(--red-light); color: var(--red); }

/* 追加ボタン */
.add-row-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 14px;
  background: none;
  border: none;
  color: var(--ink3);
  font-size: 12px;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  width: 100%;
  text-align: left;
  border-top: 1px dashed var(--border);
}
.add-row-btn:active { background: var(--surface2); }
.add-row-btn span { font-size: 16px; color: var(--accent2); }

/* 前月マイナス行 */
.row.carry-over { background: var(--red-light); }
.row.carry-over .row-label { color: var(--red); font-weight: 500; }

/* ── 残高表示 ── */
.balance-card {
  background: var(--ink);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
  box-shadow: var(--shadow);
}
.balance-card-label { font-size: 11px; color: rgba(255,255,255,0.5); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
.balance-card-value {
  font-family: 'DM Serif Display', serif;
  font-size: 32px;
  letter-spacing: -0.02em;
  margin-bottom: 2px;
}
.balance-positive { color: #A8EDCA; }
.balance-negative { color: #FFBBAA; }
.balance-note { font-size: 11px; color: rgba(255,255,255,0.4); }

/* ── グラフ・共有カード ── */
.chart-inner {
  padding: 16px;
}
.chart-wrap {
  position: relative;
  max-width: 280px;
  margin: 0 auto 16px;
}
.chart-legend {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 16px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--ink2);
}
.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.legend-amount {
  margin-left: auto;
  font-weight: 700;
  font-size: 12px;
  color: var(--ink);
}

/* LINE・共有ボタン */
.share-actions {
  display: flex;
  gap: 8px;
  border-top: 1px solid var(--border);
  padding: 12px 16px;
}
.btn-line {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  background: #00B900;
  color: #fff;
  border: none;
  border-radius: 50px;
  padding: 11px 14px;
  font-size: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 700;
  cursor: pointer;
}
.btn-line:active { opacity: 0.85; }
.btn-copy-url {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 50px;
  padding: 11px 16px;
  font-size: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--ink2);
  cursor: pointer;
  white-space: nowrap;
}
.btn-copy-url:active { background: var(--surface2); }

/* ── 読み取り専用バナー ── */
.readonly-banner {
  background: #FFF8E1;
  border: 1.5px solid #FFD54F;
  border-radius: var(--radius);
  padding: 10px 14px;
  font-size: 12px;
  color: #7B5800;
  display: flex;
  align-items: center;
  gap: 8px;
}
.readonly-banner button {
  margin-left: auto;
  background: var(--ink);
  color: #fff;
  border: none;
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 11px;
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
}

/* ── 月履歴ボタン ── */
.history-btn-wrap { text-align: center; }
.history-btn {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 50px;
  padding: 10px 24px;
  font-size: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--ink2);
  cursor: pointer;
}
.history-btn:active { background: var(--surface2); }

/* ── モーダル ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(26,20,16,0.5);
  z-index: 200;
  display: none;
  align-items: flex-end;
  backdrop-filter: blur(2px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  padding: 0 0 40px;
  animation: slideUp 0.25s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.modal-handle {
  width: 36px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 12px auto 8px;
}
.modal-title {
  font-size: 16px;
  font-weight: 700;
  padding: 8px 16px 12px;
  border-bottom: 1px solid var(--border);
  color: var(--ink);
}
.history-list { padding: 8px 0; }
.history-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--surface2);
  cursor: pointer;
}
.history-item:active { background: var(--surface2); }
.history-item-month { font-size: 15px; font-weight: 700; color: var(--ink); }
.history-item-info { font-size: 11px; color: var(--ink3); margin-top: 2px; }
.history-item-balance { font-size: 14px; font-weight: 700; }
.history-empty { padding: 24px; text-align: center; color: var(--ink3); font-size: 13px; }

/* ── ボトム アクション ── */
.bottom-actions {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 10px 14px 28px;
  background: linear-gradient(to top, var(--bg) 80%, transparent);
  display: flex;
  gap: 10px;
  z-index: 50;
}
.btn-save {
  flex: 1;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 50px;
  padding: 14px;
  font-size: 15px;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.05em;
}
.btn-save:active { opacity: 0.85; }
.btn-save:disabled { opacity: 0.4; cursor: default; }
.btn-icon {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 50px;
  padding: 14px 18px;
  font-size: 20px;
  cursor: pointer;
}
.btn-icon:active { background: var(--surface2); }

/* ── トースト ── */
.toast {
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: var(--ink);
  color: #fff;
  padding: 10px 20px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  transition: all 0.3s;
  z-index: 300;
  white-space: nowrap;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── 新規月コピー ── */
.new-month-tip {
  background: var(--blue-light);
  border-radius: var(--radius);
  padding: 10px 14px;
  font-size: 12px;
  color: var(--blue);
  display: flex;
  align-items: center;
  gap: 8px;
}
</style>
</head>
<body>

<!-- ヘッダー -->
<div class="app-header">
  <div class="app-title">やりくり帳</div>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <div class="month-label" id="monthLabel">2026年6月</div>
    <button onclick="changeMonth(1)">›</button>
  </div>
</div>

<!-- サマリーバー -->
<div class="summary-bar">
  <div class="summary-item">
    <div class="summary-label">収入</div>
    <div class="summary-value" id="summaryIncome">¥0</div>
  </div>
  <div class="summary-item">
    <div class="summary-label">支出</div>
    <div class="summary-value" id="summaryExpense">¥0</div>
  </div>
  <div class="summary-item">
    <div class="summary-label">残高</div>
    <div class="summary-value balance-positive" id="summaryBalance">¥0</div>
  </div>
</div>

<!-- メイン -->
<div class="main">

  <!-- 読み取り専用バナー（共有URL経由） -->
  <div class="readonly-banner" id="readonlyBanner" style="display:none">
    👁 共有データの閲覧中です（保存されません）
    <button onclick="exitReadonly()">自分の帳簿へ</button>
  </div>

  <!-- 新規月バナー -->
  <div class="new-month-tip" id="newMonthTip" style="display:none">
    💡 新しい月です。前月のデータをコピーしますか？
    <button onclick="copyFromPrevMonth()" style="background:var(--blue);color:#fff;border:none;border-radius:20px;padding:4px 12px;font-size:12px;font-family:inherit;cursor:pointer;white-space:nowrap">コピー</button>
  </div>

  <!-- ① 収入 -->
  <div class="card" id="card-income">
    <div class="card-header" onclick="toggleCard('income')">
      <div class="card-header-left">
        <div class="section-icon icon-income">💰</div>
        <div>
          <div class="section-title">① 収入</div>
          <div class="section-subtitle">手取り・事業用資金</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:4px">
        <div class="section-total total-income" id="total-income">¥0</div>
        <span class="chevron">▼</span>
      </div>
    </div>
    <div class="card-body" id="body-income">
      <div id="rows-income"></div>
      <button class="add-row-btn" onclick="addRow('income')"><span>＋</span>項目を追加</button>
    </div>
  </div>

  <!-- ② 固定引き落とし -->
  <div class="card" id="card-fixed">
    <div class="card-header" onclick="toggleCard('fixed')">
      <div class="card-header-left">
        <div class="section-icon icon-fixed">📋</div>
        <div>
          <div class="section-title">② 固定引き落とし</div>
          <div class="section-subtitle">住宅ローン・保険・カード等</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:4px">
        <div class="section-total total-expense" id="total-fixed">¥0</div>
        <span class="chevron">▼</span>
      </div>
    </div>
    <div class="card-body" id="body-fixed">
      <div id="rows-fixed"></div>
      <button class="add-row-btn" onclick="addRow('fixed')"><span>＋</span>項目を追加</button>
    </div>
  </div>

  <!-- ③ 現金払い -->
  <div class="card" id="card-cash">
    <div class="card-header" onclick="toggleCard('cash')">
      <div class="card-header-left">
        <div class="section-icon icon-cash">💴</div>
        <div>
          <div class="section-title">③ 現金払い</div>
          <div class="section-subtitle">家事費・お小遣い・雑費</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:4px">
        <div class="section-total total-expense" id="total-cash">¥0</div>
        <span class="chevron">▼</span>
      </div>
    </div>
    <div class="card-body" id="body-cash">
      <div id="rows-cash"></div>
      <button class="add-row-btn" onclick="addRow('cash')"><span>＋</span>項目を追加</button>
    </div>
  </div>

  <!-- ④ 現金実績 -->
  <div class="card" id="card-actual">
    <div class="card-header" onclick="toggleCard('actual')">
      <div class="card-header-left">
        <div class="section-icon icon-actual">🧾</div>
        <div>
          <div class="section-title">④ 現金実績</div>
          <div class="section-subtitle">食費・日用品・ガソリン等</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:4px">
        <div class="section-total total-expense" id="total-actual">¥0</div>
        <span class="chevron">▼</span>
      </div>
    </div>
    <div class="card-body" id="body-actual">
      <div id="rows-actual"></div>
      <button class="add-row-btn" onclick="addRow('actual')"><span>＋</span>項目を追加</button>
    </div>
  </div>

  <!-- ⑤ 貯蓄 -->
  <div class="card" id="card-savings">
    <div class="card-header" onclick="toggleCard('savings')">
      <div class="card-header-left">
        <div class="section-icon icon-savings">🏦</div>
        <div>
          <div class="section-title">⑤ 貯蓄</div>
          <div class="section-subtitle">つみたて信用・現金など</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:4px">
        <div class="section-total total-savings" id="total-savings">¥0</div>
        <span class="chevron">▼</span>
      </div>
    </div>
    <div class="card-body" id="body-savings">
      <div id="rows-savings"></div>
      <button class="add-row-btn" onclick="addRow('savings')"><span>＋</span>項目を追加</button>
    </div>
  </div>

  <!-- 残高 -->
  <div class="balance-card">
    <div class="balance-card-label">今月の残高</div>
    <div class="balance-card-value balance-positive" id="balanceValue">¥0</div>
    <div class="balance-note" id="balanceNote">収入 − 支出合計 − 貯蓄</div>
  </div>

  <!-- 📊 グラフ・共有カード -->
  <div class="card collapsed" id="card-chart">
    <div class="card-header" onclick="toggleChartCard()">
      <div class="card-header-left">
        <div class="section-icon icon-chart">📊</div>
        <div>
          <div class="section-title">支出グラフ・共有</div>
          <div class="section-subtitle">内訳の円グラフとLINE共有</div>
        </div>
      </div>
      <span class="chevron">▼</span>
    </div>
    <div class="card-body">
      <div class="chart-inner">
        <div class="chart-wrap">
          <canvas id="expenseChart"></canvas>
        </div>
        <div class="chart-legend" id="chartLegend"></div>
      </div>
      <div class="share-actions">
        <button class="btn-line" onclick="shareToLine()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63h2.386c.349 0 .63.285.63.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>
          LINEで共有
        </button>
        <button class="btn-copy-url" onclick="copyShareUrl()">🔗 URLコピー</button>
      </div>
    </div>
  </div>

</div>

<!-- ボトム アクション -->
<div class="bottom-actions">
  <button class="btn-save" id="btnSave" onclick="saveMonth()">💾 保存</button>
  <button class="btn-icon" onclick="openChartCard()" title="グラフ表示">📊</button>
  <button class="btn-icon" onclick="openHistory()">📅</button>
</div>

<!-- 履歴モーダル -->
<div class="modal-overlay" id="historyModal" onclick="closeHistoryOnOverlay(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">月別履歴</div>
    <div class="history-list" id="historyList"></div>
  </div>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
<script>
const STORAGE_KEY = 'kakeicho_v2';
const SECTION_KEYS = ['income','fixed','cash','actual','savings'];

const DEFAULT_ITEMS = {
  income: [
    { label:'手取り総額', note:'' }
  ],
  fixed: [
    { label:'事業用資金', note:'広島銀行' },
    { label:'住宅ローン', note:'ケンシン' },
    { label:'確定拠出', note:'' },
    { label:'水道代', note:'' },
    { label:'共保険', note:'' },
    { label:'楽天JCB', note:'' },
    { label:'楽天VISA', note:'' },
    { label:'寄付費', note:'' }
  ],
  cash: [
    { label:'家事費計費', note:'' },
    { label:'前月マイナス分', note:'' },
    { label:'雑費', note:'' },
    { label:'お小遣い', note:'裁量' }
  ],
  actual: [
    { label:'SBI', note:'' },
    { label:'コープ', note:'' },
    { label:'カード', note:'' },
    { label:'食費', note:'' },
    { label:'日用品', note:'' },
    { label:'ガソリン', note:'' },
    { label:'灯油', note:'' },
    { label:'まとめ', note:'' },
    { label:'お米', note:'' }
  ],
  savings: [
    { label:'貯蓄', note:'つみたて信用' },
    { label:'残余額貯蓄', note:'現金' }
  ]
};

let currentYear, currentMonth;
let monthData = {};
let isReadOnly = false;
let expenseChart = null;

const CHART_COLORS = ['#2F5FC8','#E8956A','#9B59B6','#3A7D5C'];
const CHART_LABELS = ['固定引き落とし','現金払い','現金実績','貯蓄'];
const CHART_SECTIONS = ['fixed','cash','actual','savings'];

// ─── 初期化 ───────────────────────────────────────
function init() {
  // 共有URLハッシュがあれば読み取り専用モードで表示
  if (window.location.hash && window.location.hash.length > 1) {
    try {
      const compressed = window.location.hash.slice(1);
      const json = LZString.decompressFromEncodedURIComponent(compressed);
      const shared = JSON.parse(json);
      isReadOnly = true;
      currentYear = shared.year;
      currentMonth = shared.month;
      monthData[monthKey(currentYear, currentMonth)] = shared.data;
      document.getElementById('readonlyBanner').style.display = 'flex';
      document.getElementById('btnSave').disabled = true;
    } catch(e) {
      isReadOnly = false;
    }
  }

  if (!isReadOnly) {
    const now = new Date();
    currentYear = now.getFullYear();
    currentMonth = now.getMonth() + 1;
    loadAllData();
  }
  renderMonth();
}

function loadAllData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) monthData = JSON.parse(raw);
  } catch(e) { monthData = {}; }
}

function saveAllData() {
  if (isReadOnly) return;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(monthData));
}

function monthKey(y, m) {
  return `${y}-${String(m).padStart(2,'0')}`;
}

function getMonthData(y, m) {
  const key = monthKey(y, m);
  if (!monthData[key]) return null;
  return monthData[key];
}

function createEmptyMonth() {
  const sections = {};
  SECTION_KEYS.forEach(sec => {
    sections[sec] = DEFAULT_ITEMS[sec].map((item, i) => ({
      id: `${sec}_${i}_${Date.now()}`,
      label: item.label,
      note: item.note,
      value: ''
    }));
  });
  return { sections };
}

// ─── レンダリング ────────────────────────────────
function renderMonth() {
  document.getElementById('monthLabel').textContent =
    `${currentYear}年${currentMonth}月`;

  const data = getMonthData(currentYear, currentMonth);
  const isNew = !data;

  document.getElementById('newMonthTip').style.display = (!isReadOnly && isNew) ? 'flex' : 'none';

  const d = data || createEmptyMonth();
  SECTION_KEYS.forEach(sec => renderSection(sec, d.sections[sec]));
  recalc();
}

function renderSection(sec, rows) {
  const container = document.getElementById(`rows-${sec}`);
  container.innerHTML = '';
  rows.forEach(row => container.appendChild(createRowEl(sec, row)));
}

function createRowEl(sec, row) {
  const div = document.createElement('div');
  div.className = 'row';
  div.dataset.id = row.id;
  div.dataset.sec = sec;

  const labelEl = document.createElement('input');
  labelEl.type = 'text';
  labelEl.value = row.label;
  labelEl.className = 'row-label';
  labelEl.style.cssText = 'background:transparent;border:none;outline:none;font-family:inherit;font-size:13px;color:var(--ink2);width:100%;';
  labelEl.placeholder = '項目名';
  labelEl.readOnly = isReadOnly;
  labelEl.addEventListener('change', () => onFieldChange());

  const noteEl = document.createElement('span');
  noteEl.className = 'row-note';
  noteEl.textContent = row.note;

  const yen = document.createElement('span');
  yen.className = 'yen-sign';
  yen.textContent = '¥';

  const input = document.createElement('input');
  input.type = 'number';
  input.inputMode = 'numeric';
  input.pattern = '[0-9]*';
  input.value = row.value;
  input.className = `row-input ${sec === 'income' ? 'income-input' : sec === 'savings' ? 'savings-input' : ''}`;
  if (row.value) input.classList.add('has-value');
  input.placeholder = '0';
  input.readOnly = isReadOnly;
  input.addEventListener('input', () => {
    if (input.value) input.classList.add('has-value');
    else input.classList.remove('has-value');
    onFieldChange();
  });

  const wrap = document.createElement('div');
  wrap.className = 'row-input-wrap';
  wrap.appendChild(yen);
  wrap.appendChild(input);

  div.appendChild(labelEl);
  if (row.note) div.appendChild(noteEl);
  div.appendChild(wrap);

  if (!isReadOnly) {
    const del = document.createElement('button');
    del.className = 'delete-btn';
    del.textContent = '×';
    del.addEventListener('click', () => { div.remove(); onFieldChange(); });
    div.appendChild(del);
  }
  return div;
}

// ─── 行追加 ────────────────────────────────────────
function addRow(sec) {
  if (isReadOnly) return;
  const newRow = { id:`${sec}_new_${Date.now()}`, label:'', note:'', value:'' };
  const container = document.getElementById(`rows-${sec}`);
  const el = createRowEl(sec, newRow);
  container.appendChild(el);
  el.querySelector('input[type=text]').focus();
}

// ─── 計算 ─────────────────────────────────────────
function getRows(sec) {
  const rows = [];
  document.querySelectorAll(`#rows-${sec} .row`).forEach(div => {
    const label = div.querySelector('input[type=text]').value;
    const val = parseInt(div.querySelector('input[type=number]').value) || 0;
    rows.push({ id: div.dataset.id, label, note:'', value: val ? String(val) : '' });
  });
  return rows;
}

function sumSection(sec) {
  return getRows(sec).reduce((s, r) => s + (parseInt(r.value) || 0), 0);
}

function fmtYen(n) {
  return '¥' + n.toLocaleString('ja-JP');
}

function recalc() {
  const income  = sumSection('income');
  const fixed   = sumSection('fixed');
  const cash    = sumSection('cash');
  const actual  = sumSection('actual');
  const savings = sumSection('savings');
  const totalExpense = fixed + cash + actual;
  const balance = income - totalExpense - savings;

  document.getElementById('total-income').textContent  = fmtYen(income);
  document.getElementById('total-fixed').textContent   = fmtYen(fixed);
  document.getElementById('total-cash').textContent    = fmtYen(cash);
  document.getElementById('total-actual').textContent  = fmtYen(actual);
  document.getElementById('total-savings').textContent = fmtYen(savings);

  document.getElementById('summaryIncome').textContent  = fmtYen(income);
  document.getElementById('summaryExpense').textContent = fmtYen(totalExpense);
  const balEl = document.getElementById('summaryBalance');
  balEl.textContent = fmtYen(balance);
  balEl.className = 'summary-value ' + (balance >= 0 ? 'balance-positive' : 'balance-negative');

  const bv = document.getElementById('balanceValue');
  bv.textContent = fmtYen(balance);
  bv.className = 'balance-card-value ' + (balance >= 0 ? 'balance-positive' : 'balance-negative');
  document.getElementById('balanceNote').textContent =
    `${fmtYen(income)} − ${fmtYen(totalExpense)} − ${fmtYen(savings)}`;

  // グラフが開いていれば更新
  if (!document.getElementById('card-chart').classList.contains('collapsed')) {
    renderChart();
  }
}

function onFieldChange() { recalc(); }

// ─── 保存 ─────────────────────────────────────────
function collectCurrentData() {
  const sections = {};
  SECTION_KEYS.forEach(sec => { sections[sec] = getRows(sec); });
  return { sections };
}

function saveMonth() {
  if (isReadOnly) return;
  const key = monthKey(currentYear, currentMonth);
  monthData[key] = collectCurrentData();
  saveAllData();
  showToast('💾 保存しました');
  openChartCard();
}

// ─── 月移動 ────────────────────────────────────────
function changeMonth(delta) {
  if (!isReadOnly) {
    const key = monthKey(currentYear, currentMonth);
    monthData[key] = collectCurrentData();
    saveAllData();
  }
  currentMonth += delta;
  if (currentMonth > 12) { currentMonth = 1; currentYear++; }
  if (currentMonth < 1)  { currentMonth = 12; currentYear--; }
  renderMonth();
  window.scrollTo(0, 0);
}

// ─── 前月コピー ──────────────────────────────────
function copyFromPrevMonth() {
  let py = currentYear, pm = currentMonth - 1;
  if (pm < 1) { pm = 12; py--; }
  const prev = getMonthData(py, pm);
  if (!prev) { showToast('前月データがありません'); return; }
  const sections = {};
  SECTION_KEYS.forEach(sec => {
    sections[sec] = (prev.sections[sec] || []).map(r => ({
      id: `${sec}_copy_${Date.now()}_${Math.random()}`,
      label: r.label, note: r.note, value: ''
    }));
  });
  const key = monthKey(currentYear, currentMonth);
  monthData[key] = { sections };
  saveAllData();
  renderMonth();
  showToast('✓ 前月の項目をコピーしました');
}

// ─── 読み取り専用終了 ────────────────────────────
function exitReadonly() {
  window.location.hash = '';
  window.location.reload();
}

// ─── グラフ ──────────────────────────────────────
function openChartCard() {
  const card = document.getElementById('card-chart');
  if (card.classList.contains('collapsed')) {
    card.classList.remove('collapsed');
    renderChart();
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function toggleChartCard() {
  const card = document.getElementById('card-chart');
  card.classList.toggle('collapsed');
  if (!card.classList.contains('collapsed')) renderChart();
}

function renderChart() {
  const values = CHART_SECTIONS.map(sec => sumSection(sec));
  const total = values.reduce((a, b) => a + b, 0);

  // 凡例更新
  const legend = document.getElementById('chartLegend');
  legend.innerHTML = '';
  CHART_LABELS.forEach((label, i) => {
    const pct = total > 0 ? Math.round(values[i] / total * 100) : 0;
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `
      <span class="legend-dot" style="background:${CHART_COLORS[i]}"></span>
      <span>${label}</span>
      <span style="font-size:11px;color:var(--ink3)">${pct}%</span>
      <span class="legend-amount">${fmtYen(values[i])}</span>
    `;
    legend.appendChild(item);
  });

  const ctx = document.getElementById('expenseChart').getContext('2d');
  const displayValues = total === 0 ? [1, 1, 1, 1] : values;

  if (expenseChart) {
    expenseChart.data.datasets[0].data = displayValues;
    expenseChart.update();
    return;
  }

  expenseChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: CHART_LABELS,
      datasets: [{
        data: displayValues,
        backgroundColor: CHART_COLORS,
        borderColor: '#FFFDF8',
        borderWidth: 3,
        hoverOffset: 6
      }]
    },
    options: {
      cutout: '60%',
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              if (total === 0) return ' データなし';
              const v = values[ctx.dataIndex];
              const pct = Math.round(v / total * 100);
              return ` ${fmtYen(v)} (${pct}%)`;
            }
          }
        }
      }
    }
  });
}

// ─── 共有URL ─────────────────────────────────────
function buildShareUrl() {
  const data = collectCurrentData();
  const payload = { year: currentYear, month: currentMonth, data };
  const json = JSON.stringify(payload);
  const compressed = LZString.compressToEncodedURIComponent(json);
  const base = window.location.href.split('#')[0];
  return `${base}#${compressed}`;
}

function copyShareUrl() {
  const url = buildShareUrl();
  navigator.clipboard.writeText(url).then(() => {
    showToast('🔗 URLをコピーしました');
  }).catch(() => {
    prompt('URLをコピーしてください:', url);
  });
}

function shareToLine() {
  const url = buildShareUrl();
  const text = `【やりくり帳】${currentYear}年${currentMonth}月`;
  const lineUrl = `https://social-plugins.line.me/lineit/share?text=${encodeURIComponent(text + '\n' + url)}`;
  window.open(lineUrl, '_blank');
}

// ─── 履歴 ─────────────────────────────────────────
function openHistory() {
  if (!isReadOnly) {
    const key = monthKey(currentYear, currentMonth);
    monthData[key] = collectCurrentData();
  }
  const list = document.getElementById('historyList');
  const keys = Object.keys(monthData).sort().reverse();
  if (keys.length === 0) {
    list.innerHTML = '<div class="history-empty">まだ保存済みデータがありません</div>';
  } else {
    list.innerHTML = '';
    keys.forEach(k => {
      const d = monthData[k];
      const [y, m] = k.split('-');
      const income = (d.sections.income || []).reduce((s,r) => s+(parseInt(r.value)||0), 0);
      const expense = ['fixed','cash','actual'].reduce((s,sec) =>
        s + (d.sections[sec]||[]).reduce((ss,r) => ss+(parseInt(r.value)||0), 0), 0);
      const savings = (d.sections.savings||[]).reduce((s,r) => s+(parseInt(r.value)||0), 0);
      const bal = income - expense - savings;
      const item = document.createElement('div');
      item.className = 'history-item';
      item.innerHTML = `
        <div>
          <div class="history-item-month">${y}年${parseInt(m)}月</div>
          <div class="history-item-info">収入 ${fmtYen(income)} / 支出 ${fmtYen(expense)}</div>
        </div>
        <div class="history-item-balance ${bal>=0?'total-income':'total-expense'}">${fmtYen(bal)}</div>
      `;
      item.addEventListener('click', () => {
        closeHistory();
        currentYear = parseInt(y);
        currentMonth = parseInt(m);
        renderMonth();
        window.scrollTo(0, 0);
      });
      list.appendChild(item);
    });
  }
  document.getElementById('historyModal').classList.add('open');
}

function closeHistory() { document.getElementById('historyModal').classList.remove('open'); }
function closeHistoryOnOverlay(e) { if (e.target === e.currentTarget) closeHistory(); }

// ─── カード開閉 ───────────────────────────────────
function toggleCard(sec) {
  document.getElementById(`card-${sec}`).classList.toggle('collapsed');
}

// ─── トースト ────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── 起動 ─────────────────────────────────────────
init();
</script>
</body>
</html>
